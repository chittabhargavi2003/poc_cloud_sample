server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;" always;

    # Disable caching
    add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;
    add_header Expires "0" always;

    # Serve the SPA – fall back to index.html for any path
    location / {
        try_files $uri $uri/ /index.html;
    }
}
